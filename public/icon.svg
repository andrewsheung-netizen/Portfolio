<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio">
  <!-- full-bleed dark-teal field so it works as both "any" and "maskable" -->
  <rect width="512" height="512" fill="#0d1a20"/>
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38d0d6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38d0d6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- soft area under the trend -->
  <path d="M96 332 L168 300 L232 318 L300 232 L360 262 L416 168 L416 392 L96 392 Z" fill="url(#fill)"/>
  <!-- the ascending instrument trend, within the maskable safe zone -->
  <path d="M96 332 L168 300 L232 318 L300 232 L360 262 L416 168"
        fill="none" stroke="#38d0d6" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="416" cy="168" r="24" fill="#38d0d6"/>
</svg>
