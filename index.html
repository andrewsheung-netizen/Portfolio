<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0d1a20" />
    <meta name="description" content="A live personal net-worth and assets tracker — investments, options, crypto, cash and property in one HKD picture." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Portfolio" />
    <title>Portfolio</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'light') {
            document.documentElement.dataset.theme = 'light'
            document.documentElement.style.colorScheme = 'light'
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#eff3f5')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
